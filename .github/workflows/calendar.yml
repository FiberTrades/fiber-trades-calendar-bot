name: Calendar Digest

on:
  schedule:
    # Sunday 18:00 UTC — post the week ahead
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python digest_bot.py

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain digest_state.json)" ]; then
            git add digest_state.json
            git commit -m "Update digest state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
